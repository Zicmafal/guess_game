version: '3.8'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U appuser -d appdb' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend1:
    build: .
    restart: unless-stopped
    environment:
      FLASK_DB_TYPE: postgres
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: 5432
      FLASK_DB_NAME: appdb
      FLASK_DB_USER: appuser
      FLASK_DB_PASSWORD: apppass
    depends_on:
      postgres:
        condition: service_healthy

  backend2:
    build: .
    restart: unless-stopped
    environment:
      FLASK_DB_TYPE: postgres
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: 5432
      FLASK_DB_NAME: appdb
      FLASK_DB_USER: appuser
      FLASK_DB_PASSWORD: apppass
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend1
      - backend2

volumes:
  postgres_data:
